<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Classroom</title> 
    <style>
        :root {
            --neon-cyan: #00f2ff;
            --neon-purple: #bc13fe;
            --bg-dark: #050505;
        }

        body {
            background-color: var(--bg-dark);
            color: #e0e0e0;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Views - Fixed to ensure all pages use the same class */
        .view { 
            display: none; 
            flex-direction: column; 
            align-items: center; 
            width: 100%; 
        }
        
        .active { display: flex; }

        h1 {
            font-size: 3rem;
            text-transform: uppercase;
            letter-spacing: 8px;
            background: linear-gradient(to right, var(--neon-cyan), var(--neon-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        .subtitle { margin-bottom: 20px; color: #666; letter-spacing: 2px; }

        .grid {
            display: grid;
            grid-template-columns: repeat(2, 180px);
            gap: 20px;
            margin-top: 20px;
        }

        .container {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .btn {
            padding: 15px 30px;
            background: rgba(20, 20, 25, 0.9);
            border: 1px solid var(--neon-cyan);
            color: white;
            text-transform: uppercase;
            text-decoration: none;
            cursor: pointer;
            letter-spacing: 2px;
            transition: 0.3s;
            border-radius: 4px;
            font-weight: bold;
            text-align: center;
        }

        .btn:hover {
            box-shadow: 0 0 15px var(--neon-cyan);
            transform: translateY(-3px);
            color: var(--neon-cyan);
        }

        footer { position: fixed; bottom: 10px; font-size: 10px; color: #222; }
    </style>
</head>
<body>

    <!-- HOME PAGE - Changed class to 'view' to match JS -->
    <div id="home" class="view active">
        <h1>Classroom-X</h1>
        <div class="subtitle">System Status: Secure</div>
        <div class="container">
            <!-- Changed showPage to showView -->
            <button class="btn" onclick="showView('games')">Games Library</button>
            <button class="btn" onclick="showView('apps')">Core Apps</button>
            <button class="btn" onclick="showView('settings')">Settings</button>
        </div>
    </div>

    <!-- GAMES VIEW -->
    <div id="games" class="view">
        <h1>Games</h1>
        <div class="grid">
            <a href="minecraft.html" class="btn">Minecraft</a>
            <a href="slope 2.html" class="btn">Slope 2</a>
            <a href="bitlife.html" class="btn">Bitlife</a>
            <a href="tetris.html" class="btn">Tetris</a>
        </div>
        <button class="btn" style="margin-top: 40px; border-color: var(--neon-purple);" onclick="showView('home')">← Back Home</button>
    </div>

    <!-- APPS VIEW (Placeholder so buttons work) -->
    <div id="apps" class="view">
        <h1>Core Apps</h1>
        <button class="btn" onclick="showView('home')">← Back Home</button>
    </div>

    <!-- SETTINGS VIEW (Placeholder so buttons work) -->
    <div id="settings" class="view">
        <h1>Settings</h1>
        <button class="btn" onclick="showView('home')">← Back Home</button>
    </div>

    <footer>Academic Mathematics Repository v2.4</footer>

    <script>
        function showView(viewId) {
            // Hide all elements with class 'view'
            const views = document.querySelectorAll('.view');
            views.forEach(v => v.classList.remove('active'));
            
            // Show the specific view by ID
            const selectedView = document.getElementById(viewId);
            if (selectedView) {
                selectedView.classList.add('active');
            }
        }
    </script>
</body>
</html>
