<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Classroom</title> <!-- Tab name -->
    <style>
        :root {
            --neon-cyan: #00f2ff;
            --neon-purple: #bc13fe;
            --bg-dark: #050505;
        }

        body {
            background-color: var(--bg-dark);
            color: #e0e0e0;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Views */
        .view { display: none; flex-direction: column; align-items: center; width: 100%; }
        .active { display: flex; }

        h1 {
            font-size: 3rem;
            text-transform: uppercase;
            letter-spacing: 8px;
            background: linear-gradient(to right, var(--neon-cyan), var(--neon-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(2, 180px);
            gap: 20px;
            margin-top: 20px;
        }

        /* Buttons and Links */
        .btn {
            padding: 15px 30px;
            background: rgba(20, 20, 25, 0.9);
            border: 1px solid var(--neon-cyan);
            color: white;
            text-transform: uppercase;
            text-decoration: none;
            cursor: pointer;
            letter-spacing: 2px;
            transition: 0.3s;
            border-radius: 4px;
            font-weight: bold;
        }

        .btn:hover {
            box-shadow: 0 0 15px var(--neon-cyan);
            transform: translateY(-3px);
            color: var(--neon-cyan);
        }

        /* Stealth footer for school filters */
        footer { position: fixed; bottom: 10px; font-size: 10px; color: #222; }
    </style>
</head>
<body>

    <!-- HOME VIEW -->
    <div id="home" class="view active">
        <h1>Classroom-X</h1>
        <p style="color: var(--neon-cyan); letter-spacing: 2px;">SECURE NODE ONLINE</p>
        <button class="btn" onclick="showView('games')">Enter Library</button>
    </div>

    <!-- GAMES VIEW -->
    <div id="games" class="view">
        <h1>Games</h1>
        <div class="grid">
            <!-- These links will open your other .html files -->
            <a href="minecraft.html" class="btn">Minecraft</a>
            <a href="slope.html" class="btn">Slope</a>
            <a href="bitlife.html" class="btn">Bitlife</a>
            <a href="tetris.html" class="btn">Tetris</a>
        </div>
        <button class="btn" style="margin-top: 40px; border-color: var(--neon-purple);" onclick="showView('home')">← Back Home</button>
    </div>

    <footer>Academic Mathematics Repository v2.4</footer>

    <script>
        // This function handles the "All-in-One" page swapping
        function showView(viewId) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById(viewId).classList.add('active');
        }
    </script>
</body>
</html>
