<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Classroom-X | Terminal</title>
    <style>
        :root {
            --neon-cyan: #00f2ff;
            --neon-purple: #bc13fe;
            --bg-dark: #050505;
            --card-bg: rgba(20, 20, 25, 0.9);
        }

        body {
            background: radial-gradient(circle at center, #111 0%, #000 100%);
            background-color: var(--bg-dark);
            color: #e0e0e0;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* Animated Grid Background */
        body::before {
            content: "";
            position: absolute;
            width: 200%; height: 200%;
            top: -50%; left: -50%;
            background-image: 
                linear-gradient(rgba(0, 242, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 242, 255, 0.05) 1px, transparent 1px);
            background-size: 50px 50px;
            transform: perspective(500px) rotateX(60deg);
            z-index: -1;
            animation: moveGrid 20s linear infinite;
        }

        @keyframes moveGrid {
            from { transform: perspective(500px) rotateX(60deg) translateY(0); }
            to { transform: perspective(500px) rotateX(60deg) translateY(50px); }
        }

        /* Page Sections */
        .page {
            display: none; /* Hide all pages by default */
            flex-direction: column;
            align-items: center;
            text-align: center;
            width: 100%;
            animation: fadeIn 0.5s ease;
        }

        .active { display: flex; } /* Show only the active page */

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            font-size: clamp(2.5rem, 8vw, 4rem);
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 8px;
            background: linear-gradient(to right, var(--neon-cyan), var(--neon-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 10px rgba(0, 242, 255, 0.3));
        }

        .subtitle {
            font-size: 0.8rem;
            letter-spacing: 4px;
            color: var(--neon-cyan);
            margin-bottom: 40px;
            text-transform: uppercase;
        }

        /* Buttons */
        .container { display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; }

        .btn {
            padding: 15px 35px;
            background: var(--card-bg);
            color: #fff;
            border: 1px solid rgba(0, 242, 255, 0.3);
            border-radius: 4px;
            cursor: pointer;
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 2px;
            transition: 0.3s;
            backdrop-filter: blur(10px);
        }

        .btn:hover {
            border-color: var(--neon-cyan);
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.4);
            color: var(--neon-cyan);
        }

        .back-btn {
            margin-top: 50px;
            color: var(--neon-purple);
            border-color: var(--neon-purple);
            background: rgba(188, 19, 254, 0.05);
        }

        .back-btn:hover {
            background: var(--neon-purple);
            color: white;
            box-shadow: 0 0 20px rgba(188, 19, 254, 0.4);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(3, 150px);
            gap: 20px;
            margin-top: 20px;
        }

        .game-card {
            background: rgba(255,255,255,0.05);
            padding: 20px;
            border: 1px solid #333;
            border-radius: 8px;
        }
    </style>
</head>
<body>

    <!-- HOME PAGE -->
    <div id="home" class="page active">
        <h1>Classroom-X</h1>
        <div class="subtitle">System Status: Secure</div>
        <div class="container">
            <button class="btn" onclick="showPage('games')">Games Library</button>
            <button class="btn" onclick="showPage('apps')">Core Apps</button>
            <button class="btn" onclick="showPage('settings')">Settings</button>
        </div>
    </div>

    <!-- GAMES PAGE -->
    <div id="games" class="page">
        <h1>Games</h1>
        <div class="grid">
            <div class="minecraft.html">Minecraft</div>
            <div class="game-card">Game 2 </div>
            <div class="game-card">Game 3 (not added yet)</div>
        </div>
        <button class="btn back-btn" onclick="showPage('home')">← Back to Terminal</button>
    </div>

    <!-- APPS PAGE -->
    <div id="apps" class="page">
        <h1>Apps</h1>
        <p>Utilities and Proxies loading...</p>
        <button class="btn back-btn" onclick="showPage('home')">← Back to Terminal</button>
    </div>

    <!-- SETTINGS PAGE -->
    <div id="settings" class="page">
        <h1>Settings</h1>
        <p>Configure Stealth Mode</p>
        <button class="btn back-btn" onclick="showPage('home')">← Back to Terminal</button>
    </div>

    <script>
        function showPage(pageId) {
            // Hide all pages
            document.querySelectorAll('.page').forEach(page => {
                page.classList.remove('active');
            });
            // Show the selected page
            document.getElementById(pageId).classList.add('active');
        }
    </script>

</body>
</html>
