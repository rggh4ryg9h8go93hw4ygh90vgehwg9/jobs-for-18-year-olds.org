<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Classroom-X | Portal</title>
    <style>
        :root {
            --neon-cyan: #00f2ff;
            --neon-purple: #bc13fe;
            --bg-dark: #050505;
        }

        body {
            background-color: var(--bg-dark);
            color: #e0e0e0;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        h1 {
            font-size: 3rem;
            text-transform: uppercase;
            letter-spacing: 8px;
            background: linear-gradient(to right, var(--neon-cyan), var(--neon-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(2, 180px);
            gap: 20px;
            margin-top: 30px;
        }

        /* These are the actual links formatted to look like buttons */
        .game-link {
            padding: 20px;
            background: rgba(20, 20, 25, 0.9);
            border: 1px solid var(--neon-cyan);
            color: white;
            text-transform: uppercase;
            text-decoration: none;
            text-align: center;
            letter-spacing: 2px;
            font-weight: bold;
            transition: 0.3s;
            border-radius: 4px;
        }

        .game-link:hover {
            box-shadow: 0 0 20px var(--neon-cyan);
            transform: translateY(-5px);
            color: var(--neon-cyan);
        }
    </style>
</head>
<body>

    <h1>Classroom-X</h1>
    <p style="color: var(--neon-cyan); letter-spacing: 2px;">SECURE NODE ONLINE</p>

    <div class="grid">
        <!-- These link directly to the other .html files in your repo -->
        <a href="minecraft.html" class="game-link">Minecraft</a>
        <a href="slope.html" class="game-link">Slope</a>
        <a href="bitlife.html" class="game-link">Bitlife</a>
        <a href="tetris.html" class="game-link">Tetris</a>
    </div>

</body>
</html>
